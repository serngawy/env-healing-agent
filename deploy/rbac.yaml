apiVersion: v1
kind: ServiceAccount
metadata:
  name: env-healing-agents
  namespace: env-healing-agents-ns
  labels:
    app: env-healing-agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: env-healing-agents
  labels:
    app: env-healing-agents
rules:
  # Read pod logs (KubernetesLogStream)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Read namespaces and events for diagnostics
  - apiGroups: [""]
    resources: ["namespaces", "events"]
    verbs: ["get", "list", "watch"]
  # Read and patch ROSA HCP custom resources for diagnostics
  - apiGroups: ["controlplane.cluster.x-k8s.io"]
    resources: ["rosacontrolplanes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["infrastructure.cluster.x-k8s.io"]
    resources: ["rosanetworks", "rosaroleconfigs", "rosamachinepools", "rosaclusters"]
    verbs: ["get", "list", "watch"]
  # Read and patch CAPI custom resources for diagnostics
  - apiGroups: ["cluster.x-k8s.io"]
    resources: ["clusters", "machinepools"]
    verbs: ["get", "list", "watch"]
  # Read deployments to verify CAPI/CAPA installation
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: env-healing-agents
  labels:
    app: env-healing-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: env-healing-agents
subjects:
  - kind: ServiceAccount
    name: env-healing-agents
    namespace: env-healing-agents-ns
---
# Namespace-scoped Role: allows the agent to patch its own knowledge-base ConfigMaps
# so that patterns and fix strategies discovered at runtime survive pod restarts.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: env-healing-agents-configmap-writer
  namespace: env-healing-agents-ns
  labels:
    app: env-healing-agents
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: env-healing-agents-configmap-writer
  namespace: env-healing-agents-ns
  labels:
    app: env-healing-agents
subjects:
  - kind: ServiceAccount
    name: env-healing-agents
    namespace: env-healing-agents-ns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: env-healing-agents-configmap-writer
