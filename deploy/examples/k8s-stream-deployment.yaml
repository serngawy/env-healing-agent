# KubernetesLogStream — watch live pod logs across multiple namespaces
#
# Scenario: The agent runs as a standalone monitor pod and streams logs
# from all pods matching a label selector in real time across one or more
# namespaces. Authentication uses the mounted service account token
# automatically (SDK mode) — no kubectl binary or kubeconfig needed.
#
# Namespace modes:
#   Single namespace   — one --k8s-namespace flag
#   Multiple namespaces — repeat --k8s-namespace for each namespace
#   All namespaces     — set --k8s-namespace to "*"
#
# Prerequisites:
#   oc apply -f ../configmap.yaml   # namespace + knowledge-base ConfigMaps
#   oc apply -f ../rbac.yaml        # ServiceAccount + ClusterRole (pods/log)
#
# Customise:
#   WATCH_LABEL — label selector for the pods to watch
#   WATCH_NAMESPACE_1, WATCH_NAMESPACE_2 — namespaces to watch
#   (add or remove --k8s-namespace args and env vars as needed)
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-healing-agent-k8s-stream
  namespace: env-healing-agent-ns
  labels:
    app: env-healing-agent-k8s-stream
    stream-type: kubernetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: env-healing-agent-k8s-stream
  template:
    metadata:
      labels:
        app: env-healing-agent-k8s-stream
    spec:
      serviceAccountName: env-healing-agent

      initContainers:
        - name: merge-knowledge-base
          image: python:3.11-slim
          command: ["python", "/scripts/merge_kb.py"]
          volumeMounts:
            - name: knowledge-base
              mountPath: /kb
            - name: init-script
              mountPath: /scripts
            - name: known-issues-1
              mountPath: /cms/known-issues/1
            - name: known-issues-2
              mountPath: /cms/known-issues/2
            - name: fix-strategies-1
              mountPath: /cms/fix-strategies/1
            - name: remediation-outcomes-1
              mountPath: /cms/remediation-outcomes/1

      containers:
        - name: env-healing-agent
          image: quay.io/melserng/env-healing-agent:latest
          imagePullPolicy: Always
          command: ["python", "-m", "env_healing_agent.cli"]
          args:
            - "generic"
            - "sleep"
            - "infinity"
            - "--kb-dir"
            - "/kb"
            # SDK mode is auto-detected inside a pod — no --k8s-cmd needed.
            - "--k8s-label"
            - "$(WATCH_LABEL)"
            # Repeat --k8s-namespace for each namespace to watch.
            # Replace with a single --k8s-namespace "*" to watch all namespaces.
            - "--k8s-namespace"
            - "$(WATCH_NAMESPACE_1)"
            - "--k8s-namespace"
            - "$(WATCH_NAMESPACE_2)"
            - "--verbose"
          env:
            - name: WATCH_LABEL
              value: "app=my-service"
            - name: WATCH_NAMESPACE_1
              value: "default"
            - name: WATCH_NAMESPACE_2
              value: "kube-system"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: env-healing-agent-vertex
                  key: project-id
            - name: CLOUD_ML_REGION
              valueFrom:
                secretKeyRef:
                  name: env-healing-agent-vertex
                  key: region
          volumeMounts:
            - name: knowledge-base
              mountPath: /kb
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "env_healing_agent.cli"]
            initialDelaySeconds: 15
            periodSeconds: 30

      volumes:
        - name: knowledge-base
          emptyDir: {}
        - name: init-script
          configMap:
            name: env-healing-agent-init-script
        - name: known-issues-1
          configMap:
            name: env-healing-agent-known-issues-1
        - name: known-issues-2
          configMap:
            name: env-healing-agent-known-issues-2
        - name: fix-strategies-1
          configMap:
            name: env-healing-agent-fix-strategies-1
        - name: remediation-outcomes-1
          configMap:
            name: env-healing-agent-remediation-outcomes-1

# ---------------------------------------------------------------------------
# To watch ALL namespaces instead, replace the two --k8s-namespace args above
# with a single:
#   - "--k8s-namespace"
#   - "*"
# and ensure the ClusterRole in rbac.yaml has list/watch on pods cluster-wide.
# ---------------------------------------------------------------------------
