# CloudWatchStream — poll an AWS CloudWatch Logs group
#
# Scenario: The agent continuously polls a CloudWatch log group (e.g. EKS
# control-plane logs, a Lambda function, or an application log group) and
# feeds every new event through the monitoring pipeline.
#
# Authentication: boto3 uses the standard AWS credential chain in order:
#   1. AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars (from Secret below)
#   2. IRSA web-identity token   — set AWS_ROLE_ARN + AWS_WEB_IDENTITY_TOKEN_FILE
#   3. EC2/EKS instance metadata — automatic if the node has an IAM role
#
# Prerequisites:
#   oc apply -f ../configmap.yaml
#   oc apply -f ../rbac.yaml
#   oc create secret generic env-healing-agents-aws-credentials \
#     --from-literal=access-key-id=<KEY> \
#     --from-literal=secret-access-key=<SECRET> \
#     --from-literal=region=us-east-1 \
#     -n env-healing-agents-ns
#
# Customise:
#   CLOUDWATCH_LOG_GROUP — the log group to watch
#   CLOUDWATCH_REGION    — AWS region
#   CLOUDWATCH_FILTER    — CloudWatch filter pattern (empty = all events)
#   CLOUDWATCH_POLL      — poll interval in seconds
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-healing-agents-cloudwatch
  namespace: env-healing-agents-ns
  labels:
    app: env-healing-agents-cloudwatch
    stream-type: cloudwatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: env-healing-agents-cloudwatch
  template:
    metadata:
      labels:
        app: env-healing-agents-cloudwatch
    spec:
      serviceAccountName: env-healing-agents

      initContainers:
        - name: merge-knowledge-base
          image: python:3.11-slim
          command: ["python", "/scripts/merge_kb.py"]
          volumeMounts:
            - name: knowledge-base
              mountPath: /kb
            - name: init-script
              mountPath: /scripts
            - name: known-issues-1
              mountPath: /cms/known-issues/1
            - name: known-issues-2
              mountPath: /cms/known-issues/2
            - name: fix-strategies-1
              mountPath: /cms/fix-strategies/1
            - name: remediation-outcomes-1
              mountPath: /cms/remediation-outcomes/1

      containers:
        - name: env-healing-agents
          image: quay.io/melserng/env-healing-agents:latest
          imagePullPolicy: Always
          command: ["python", "-m", "env_healing_agent.cli"]
          args:
            - "generic"
            - "sleep"
            - "infinity"
            - "--kb-dir"
            - "/kb"
            - "--cloudwatch-log-group"
            - "$(CLOUDWATCH_LOG_GROUP)"
            - "--cloudwatch-region"
            - "$(CLOUDWATCH_REGION)"
            - "--cloudwatch-filter"
            - "$(CLOUDWATCH_FILTER)"
            - "--cloudwatch-poll"
            - "$(CLOUDWATCH_POLL)"
            - "--verbose"
          env:
            # Set to "true" to allow the remediation agent to apply fixes.
            # When "false" (default) issues are detected and diagnosed but no fix is executed.
            - name: REMEDIATION
              value: "false"
            - name: CLOUDWATCH_LOG_GROUP
              value: "/aws/eks/my-cluster/cluster"
            - name: CLOUDWATCH_REGION
              value: "us-east-1"
            - name: CLOUDWATCH_FILTER
              value: ""          # Empty = stream all events
            - name: CLOUDWATCH_POLL
              value: "5"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: env-healing-agents-vertex
                  key: project-id
            - name: CLOUD_ML_REGION
              valueFrom:
                secretKeyRef:
                  name: env-healing-agents-vertex
                  key: region
            # AWS credentials for boto3
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: env-healing-agents-aws-credentials
                  key: region
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: env-healing-agents-aws-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: env-healing-agents-aws-credentials
                  key: secret-access-key
            # --- IRSA alternative (comment out the Secret env vars above) ---
            # - name: AWS_ROLE_ARN
            #   value: "arn:aws:iam::123456789012:role/my-agent-role"
            # - name: AWS_WEB_IDENTITY_TOKEN_FILE
            #   value: "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
          volumeMounts:
            - name: knowledge-base
              mountPath: /kb
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "env_healing_agent.cli"]
            initialDelaySeconds: 15
            periodSeconds: 30

      volumes:
        - name: knowledge-base
          emptyDir: {}
        - name: init-script
          configMap:
            name: env-healing-agents-init-script
        - name: known-issues-1
          configMap:
            name: env-healing-agents-known-issues-1
        - name: known-issues-2
          configMap:
            name: env-healing-agents-known-issues-2
        - name: fix-strategies-1
          configMap:
            name: env-healing-agents-fix-strategies-1
        - name: remediation-outcomes-1
          configMap:
            name: env-healing-agents-remediation-outcomes-1
