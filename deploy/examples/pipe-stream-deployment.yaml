# PipeStream — read log lines fed into stdin from a sidecar process
#
# Scenario: A test-runner sidecar writes its output to a named pipe (FIFO)
# in a shared emptyDir volume. The env-healing-agents container reads from that FIFO
# via stdin (pipe subcommand). Both containers start together; the agent
# monitors every line the runner produces, in real time.
#
# Why a named pipe?
#   A FIFO blocks the writer until the reader is open, which naturally
#   synchronises startup. emptyDir is backed by tmpfs on most clusters,
#   so the pipe lives entirely in memory.
#
# Replacing the test-runner image:
#   Swap `my-test-runner:latest` for your own image and update the command.
#   The only contract is that it writes to /shared/output.fifo.
#
# Prerequisites:
#   oc apply -f ../configmap.yaml
#   oc apply -f ../rbac.yaml
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-healing-agents-pipe
  namespace: env-healing-agents-ns
  labels:
    app: env-healing-agents-pipe
    stream-type: pipe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: env-healing-agents-pipe
  template:
    metadata:
      labels:
        app: env-healing-agents-pipe
    spec:
      serviceAccountName: env-healing-agents

      # Create the FIFO before either container starts so both can open it.
      initContainers:
        - name: merge-knowledge-base
          image: python:3.11-slim
          command: ["python", "/scripts/merge_kb.py"]
          volumeMounts:
            - name: knowledge-base
              mountPath: /kb
            - name: init-script
              mountPath: /scripts
            - name: known-issues-1
              mountPath: /cms/known-issues/1
            - name: known-issues-2
              mountPath: /cms/known-issues/2
            - name: fix-strategies-1
              mountPath: /cms/fix-strategies/1
            - name: remediation-outcomes-1
              mountPath: /cms/remediation-outcomes/1

        - name: create-fifo
          image: busybox:latest
          command: ["mkfifo", "/shared/output.fifo"]
          volumeMounts:
            - name: shared-pipe
              mountPath: /shared

      containers:
        # ----------------------------------------------------------------
        # Sidecar: test runner — writes all output to the shared FIFO.
        # Replace this image and command with your actual test runner.
        # ----------------------------------------------------------------
        - name: test-runner
          image: my-test-runner:latest
          command: ["/bin/sh", "-c"]
          args:
            - "my-test-suite --output-format plain > /shared/output.fifo 2>&1"
          volumeMounts:
            - name: shared-pipe
              mountPath: /shared

        # ----------------------------------------------------------------
        # Agent: reads from the FIFO via stdin (pipe subcommand).
        # ----------------------------------------------------------------
        - name: env-healing-agents
          image: quay.io/melserng/env-healing-agents:latest
          imagePullPolicy: Always
          # The shell redirect feeds the FIFO into the agent's stdin.
          command: ["/bin/sh", "-c"]
          args:
            - >
              python -m env_healing_agent.cli pipe
              --kb-dir /kb
              --verbose
              --report
              < /shared/output.fifo
          env:
            # Set to "true" to allow the remediation agent to apply fixes.
            # When "false" (default) issues are detected and diagnosed but no fix is executed.
            - name: REMEDIATION
              value: "false"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: env-healing-agents-vertex
                  key: project-id
            - name: CLOUD_ML_REGION
              valueFrom:
                secretKeyRef:
                  name: env-healing-agents-vertex
                  key: region
          volumeMounts:
            - name: knowledge-base
              mountPath: /kb
            - name: shared-pipe
              mountPath: /shared
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "env_healing_agent.cli"]
            initialDelaySeconds: 10
            periodSeconds: 30

      volumes:
        - name: knowledge-base
          emptyDir: {}
        - name: shared-pipe
          emptyDir: {}         # tmpfs — FIFO lives in memory, no disk I/O
        - name: init-script
          configMap:
            name: env-healing-agents-init-script
        - name: known-issues-1
          configMap:
            name: env-healing-agents-known-issues-1
        - name: known-issues-2
          configMap:
            name: env-healing-agents-known-issues-2
        - name: fix-strategies-1
          configMap:
            name: env-healing-agents-fix-strategies-1
        - name: remediation-outcomes-1
          configMap:
            name: env-healing-agents-remediation-outcomes-1
