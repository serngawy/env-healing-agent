# env-healing-agent secrets
#
# Fill in the placeholder values before applying:
#
#   ANTHROPIC_VERTEX_PROJECT_ID — GCP project ID that has the Vertex AI API enabled
#   CLOUD_ML_REGION             — GCP region where Claude is available (e.g. us-east5)
#   AWS_ACCESS_KEY_ID           — AWS access key for remediation fix strategies
#   AWS_SECRET_ACCESS_KEY       — AWS secret key for remediation fix strategies
#   AWS_DEFAULT_REGION          — AWS region (e.g. us-east-1)
#
# Apply with:
#   oc apply -f deploy/secrets.yaml
#
# Or use the Makefile target which creates the Vertex secret automatically:
#   ANTHROPIC_VERTEX_PROJECT_ID=<project> CLOUD_ML_REGION=<region> make deploy
#
# Note: never commit this file with real values populated.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: env-healing-agent-ns
  labels:
    app: env-healing-agent
---
# Vertex AI credentials for Claude diagnostic agent.
# Authentication uses GCP Application Default Credentials (ADC) — no API key
# required. Inside Kubernetes, Workload Identity or the node service account
# handles auth automatically; only the project ID and region are needed here.
apiVersion: v1
kind: Secret
metadata:
  name: env-healing-agent-vertex
  namespace: env-healing-agent-ns
  labels:
    app: env-healing-agent
type: Opaque
stringData:
  project-id: "<ANTHROPIC_VERTEX_PROJECT_ID>"
  region: "<CLOUD_ML_REGION>"
---
# AWS credentials for remediation fix strategies (CloudFormation, EC2, VPC cleanup).
# The 'credentials' key holds a base64-encoded AWS credentials file mounted at
# /root/.aws/credentials inside the agent pod via AWS_SHARED_CREDENTIALS_FILE.
apiVersion: v1
kind: Secret
metadata:
  name: env-healing-agent-aws-credentials
  namespace: env-healing-agent-ns
  labels:
    app: env-healing-agent
type: Opaque
data:
  credentials: "<BASE64_ENCODED_AWS_CREDENTIALS_FILE>"
---
# OCM credentials for the ROSA fix strategy (rosa login + rosa create ocm-role).
# Copy values from the rosa-creds-secret in your ROSA namespace, or obtain them
# from the Red Hat Hybrid Cloud Console.
apiVersion: v1
kind: Secret
metadata:
  name: env-healing-agent-ocm-credentials
  namespace: env-healing-agent-ns
  labels:
    app: env-healing-agent
type: Opaque
stringData:
  ocmApiUrl: "<OCM_API_URL>"
  ocmClientID: "<OCM_CLIENT_ID>"
  ocmClientSecret: "<OCM_CLIENT_SECRET>"
---
# GCP Service Account key for Vertex AI / Claude authentication.
# The SA must have the "Vertex AI User" role on the project.
# Create with:
#   oc create secret generic env-healing-agent-gcp-sa \
#     -n env-healing-agent-ns \
#     --from-file=sa-key.json=<path-to-key.json>
apiVersion: v1
kind: Secret
metadata:
  name: env-healing-agent-gcp-sa
  namespace: env-healing-agent-ns
  labels:
    app: env-healing-agent
type: Opaque
data:
  sa-key.json: "<BASE64_ENCODED_SA_KEY_JSON>"
